<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>电子光栅卡</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c6aef">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #14141f; --surface2: #1e1e2e;
    --accent: #7c6aef; --accent-glow: #9d8fff;
    --text: #e8e6f0; --text-dim: #8886a0;
    --border: #2a2a3e; --radius: 14px; --danger: #e24b4a;
  }
  body {
    font-family: 'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100dvh; display: flex; flex-direction: column; align-items: center;
    overflow-x: hidden; -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent; padding-bottom: 40px;
  }
  .header { width:100%; padding:24px 20px 8px; text-align:center; }
  .header h1 {
    font-size:22px; font-weight:700; letter-spacing:2px;
    background:linear-gradient(135deg,var(--accent-glow),#c8a0ff);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .header p { font-size:12px; color:var(--text-dim); margin-top:4px; }
  .section { width:100%; max-width:440px; padding:0 16px; }
  .section-title { font-size:13px; color:var(--text-dim); margin:16px 0 8px; padding-left:4px; }
  .img-list { display:flex; flex-direction:column; gap:8px; }
  .img-item {
    display:flex; align-items:center; gap:10px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); padding:10px 12px; animation:fadeIn .3s ease;
  }
  .img-thumb { width:50px; height:50px; border-radius:10px; object-fit:cover; flex-shrink:0; background:var(--surface2); }
  .img-info { flex:1; min-width:0; }
  .img-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:5px; }
  .angle-row { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--text-dim); }
  .angle-input {
    width:50px; padding:4px 5px; border:1px solid var(--border); border-radius:8px;
    background:var(--surface2); color:var(--text); font-size:13px; font-family:inherit;
    text-align:center; outline:none;
  }
  .angle-input:focus { border-color:var(--accent); }
  .img-remove {
    width:30px; height:30px; border:none; border-radius:8px;
    background:rgba(226,75,74,.12); color:var(--danger); font-size:15px;
    cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  }
  .img-remove:active { background:rgba(226,75,74,.25); }
  .add-btn {
    width:100%; padding:14px; border:2px dashed var(--border); border-radius:var(--radius);
    background:transparent; color:var(--text-dim); font-size:14px; font-family:inherit;
    cursor:pointer; margin-top:8px;
  }
  .add-btn:active { border-color:var(--accent); color:var(--accent-glow); }
  .setting-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,.04); }
  .setting-row:last-child { border-bottom:none; }
  .setting-label { font-size:13px; color:var(--text-dim); }
  .setting-right { display:flex; align-items:center; gap:8px; }
  .setting-value { font-size:14px; font-weight:700; color:var(--accent-glow); min-width:28px; text-align:right; font-variant-numeric:tabular-nums; }
  input[type=range] { -webkit-appearance:none; appearance:none; width:110px; height:4px; border-radius:2px; background:var(--border); outline:none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:20px; height:20px; border-radius:50%; background:var(--accent); cursor:pointer; }
  .axis-toggle { display:flex; background:var(--surface); border-radius:10px; overflow:hidden; border:1px solid var(--border); }
  .axis-btn { padding:5px 14px; font-size:12px; font-family:inherit; border:none; background:transparent; color:var(--text-dim); cursor:pointer; transition:all .2s; }
  .axis-btn.active { background:var(--accent); color:#fff; }
  .angle-preview { margin-top:12px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; }
  .angle-bar-label { font-size:11px; color:var(--text-dim); margin-bottom:8px; }
  .angle-bar { width:100%; height:26px; border-radius:8px; overflow:hidden; display:flex; }
  .angle-segment {
    height:100%; display:flex; align-items:center; justify-content:center;
    font-size:10px; font-weight:600; color:rgba(255,255,255,.85); min-width:2px; transition:flex .3s;
  }
  .angle-bar-ticks { display:flex; justify-content:space-between; margin-top:4px; font-size:10px; color:var(--text-dim); }
  .auto-btn {
    padding:6px 14px; border:1px solid var(--border); border-radius:8px;
    background:var(--surface2); color:var(--accent-glow); font-size:12px; font-family:inherit; cursor:pointer; margin-top:8px;
  }
  .auto-btn:active { background:var(--surface); }
  .start-btn {
    width:calc(100% - 32px); max-width:420px; padding:15px; border:none;
    border-radius:var(--radius); background:linear-gradient(135deg,var(--accent),#9b7aff);
    color:#fff; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer;
    letter-spacing:1px; margin-top:20px;
  }
  .start-btn:disabled { opacity:.25; cursor:not-allowed; }
  .start-btn:not(:disabled):active { transform:scale(.97); }
  .canvas-view { display:none; position:fixed; inset:0; background:#000; z-index:100; flex-direction:column; align-items:center; justify-content:center; }
  .canvas-view.active { display:flex; }
  .canvas-view canvas { max-width:100%; max-height:80dvh; }
  .canvas-hud {
    position:fixed; bottom:0; left:0; right:0; padding:14px 16px 24px;
    display:flex; align-items:flex-end; justify-content:space-between;
    background:linear-gradient(to top,rgba(0,0,0,.92) 40%,transparent);
  }
  @media (orientation:landscape) {
    .canvas-view canvas { max-width:100%; max-height:96dvh; }
    .canvas-hud {
      padding:8px 16px 12px; flex-direction:row; align-items:center;
      background:linear-gradient(to top,rgba(0,0,0,.95) 60%,transparent);
    }
    .canvas-hud .hud-bar { max-width:200px; }
    .hud-angle { font-size:20px; }
    .hud-showing { font-size:11px; }
    .back-btn { padding:8px 16px; font-size:12px; }
  }
  .hud-angle { font-size:26px; font-weight:700; color:var(--accent-glow); font-variant-numeric:tabular-nums; line-height:1; }
  .hud-showing { font-size:12px; color:rgba(255,255,255,.45); margin-top:4px; }
  .hud-bar { width:100%; height:3px; background:rgba(255,255,255,.08); border-radius:2px; margin-top:8px; position:relative; }
  .hud-bar-dot { width:8px; height:8px; border-radius:50%; background:var(--accent-glow); position:absolute; top:-2.5px; transition:left .05s linear; }
  .back-btn {
    padding:10px 20px; border:1px solid rgba(255,255,255,.15); border-radius:12px;
    background:rgba(255,255,255,.06); color:#fff; font-size:13px; font-family:inherit; cursor:pointer;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  }
  .seg-0{background:#7c6aef} .seg-1{background:#1d9e75} .seg-2{background:#d85a30} .seg-3{background:#d4537e}
  .seg-4{background:#378add} .seg-5{background:#ba7517} .seg-6{background:#639922} .seg-7{background:#a32d2d}
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .hidden-input { display:none; }
</style>
</head>
<body>

<div class="header">
  <h1>电子光栅卡</h1>
  <p>多图上传 · 自定义角度 · 倾斜手机体验</p>
</div>

<div class="section">
  <div class="section-title">图片列表 (至少2张)</div>
  <div class="img-list" id="imgList"></div>
  <button class="add-btn" id="addBtn">+ 添加图片</button>
  <input type="file" accept="image/*" class="hidden-input" id="fileInput">
</div>

<div class="section">
  <div class="angle-preview" id="anglePreview" style="display:none">
    <div class="angle-bar-label">角度分布预览</div>
    <div class="angle-bar" id="angleBar"></div>
    <div class="angle-bar-ticks"><span>-90°</span><span>-45°</span><span>0°</span><span>45°</span><span>90°</span></div>
    <div style="text-align:center"><button class="auto-btn" onclick="autoDistribute()">自动均分角度</button></div>
  </div>
</div>

<div class="section">
  <div class="section-title">参数设置</div>
  <div class="setting-row">
    <span class="setting-label">切换模式</span>
    <div class="axis-toggle">
      <button class="axis-btn active" data-mode="fade" onclick="setMode('fade')">渐变</button>
      <button class="axis-btn" data-mode="strip" onclick="setMode('strip')">光栅</button>
    </div>
  </div>
  <div class="setting-row">
    <span class="setting-label">切换角度范围</span>
    <div class="setting-right">
      <input type="range" id="fadeSlider" min="4" max="60" value="30">
      <span class="setting-value" id="fadeValue">30°</span>
    </div>
  </div>
  <div class="setting-row" id="stripRow" style="display:none">
    <span class="setting-label">光栅条纹数</span>
    <div class="setting-right">
      <input type="range" id="stripSlider" min="8" max="80" value="24">
      <span class="setting-value" id="stripValue">24</span>
    </div>
  </div>
  <div class="setting-row">
    <span class="setting-label">屏幕方向</span>
    <div class="axis-toggle">
      <button class="axis-btn active" data-ori="portrait" onclick="setOriMode('portrait')">竖屏</button>
      <button class="axis-btn" data-ori="landscape" onclick="setOriMode('landscape')">横屏</button>
      <button class="axis-btn" data-ori="auto" onclick="setOriMode('auto')">自动</button>
    </div>
  </div>
  <div class="setting-row">
    <span class="setting-label">倾斜方向</span>
    <div class="axis-toggle">
      <button class="axis-btn active" data-axis="x" onclick="setAxis('x')">左右</button>
      <button class="axis-btn" data-axis="y" onclick="setAxis('y')">前后</button>
    </div>
  </div>
</div>

<button class="start-btn" id="startBtn" disabled>请至少上传2张图片</button>

<div class="canvas-view" id="canvasView">
  <canvas id="mainCanvas"></canvas>
  <div class="canvas-hud">
    <div>
      <div class="hud-angle" id="hudAngle">0°</div>
      <div class="hud-showing" id="hudShowing">--</div>
      <div class="hud-bar"><div class="hud-bar-dot" id="hudDot" style="left:50%"></div></div>
    </div>
    <button class="back-btn" id="backBtn">← 返回</button>
  </div>
</div>

<script>
const images = [];
let tiltAxis = 'x', isRunning = false, fadeWidth = 30;
let transMode = 'fade'; // 'fade' or 'strip'
let stripCount = 24;
let oriMode = 'portrait'; // 'portrait', 'landscape', 'auto'
const COLORS = ['#7c6aef','#1d9e75','#d85a30','#d4537e','#378add','#ba7517','#639922','#a32d2d'];

const imgList = document.getElementById('imgList');
const addBtn = document.getElementById('addBtn');
const fileInput = document.getElementById('fileInput');
const anglePreview = document.getElementById('anglePreview');
const angleBar = document.getElementById('angleBar');
const startBtn = document.getElementById('startBtn');
const canvasView = document.getElementById('canvasView');
const mainCanvas = document.getElementById('mainCanvas');
const ctx = mainCanvas.getContext('2d');
const hudAngle = document.getElementById('hudAngle');
const hudShowing = document.getElementById('hudShowing');
const hudDot = document.getElementById('hudDot');

addBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      images.push({
        img, src: ev.target.result,
        name: file.name.length > 18 ? file.name.slice(0,16)+'...' : file.name,
        fromAngle: 0, toAngle: 0
      });
      autoDistribute();
      renderList();
      updateUI();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  fileInput.value = '';
});

function removeImage(idx) {
  images.splice(idx, 1);
  autoDistribute();
  renderList();
  updateUI();
}

function renderList() {
  imgList.innerHTML = '';
  images.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'img-item';
    div.innerHTML =
      `<img class="img-thumb" src="${item.src}">`+
      `<div class="img-info">`+
        `<div class="img-name" style="color:${COLORS[i%8]}">${i+1}. ${item.name}</div>`+
        `<div class="angle-row">`+
          `<span>从</span>`+
          `<input class="angle-input" type="number" value="${item.fromAngle}" min="-90" max="90" onchange="updAngle(${i},'f',this.value)">`+
          `<span>° 到</span>`+
          `<input class="angle-input" type="number" value="${item.toAngle}" min="-90" max="90" onchange="updAngle(${i},'t',this.value)">`+
          `<span>°</span>`+
        `</div>`+
      `</div>`+
      `<button class="img-remove" onclick="removeImage(${i})">✕</button>`;
    imgList.appendChild(div);
  });
}

function updAngle(idx, which, val) {
  val = Math.max(-90, Math.min(90, parseInt(val)||0));
  if (which==='f') images[idx].fromAngle = val;
  else images[idx].toAngle = val;
  renderAngleBar();
}

function autoDistribute() {
  if (!images.length) return;
  const span = 180 / images.length;
  images.forEach((item, i) => {
    item.fromAngle = Math.round(-90 + i * span);
    item.toAngle = Math.round(-90 + (i+1) * span);
  });
  renderList();
  renderAngleBar();
}

function renderAngleBar() {
  angleBar.innerHTML = '';
  if (!images.length) { anglePreview.style.display='none'; return; }
  anglePreview.style.display = '';
  const sorted = images.map((m,i)=>({...m,idx:i})).sort((a,b)=>a.fromAngle-b.fromAngle);
  sorted.forEach(item => {
    const span = Math.max(1, Math.abs(item.toAngle - item.fromAngle));
    const seg = document.createElement('div');
    seg.className = `angle-segment seg-${item.idx%8}`;
    seg.style.flex = span;
    seg.textContent = span >= 20 ? `${item.fromAngle}°~${item.toAngle}°` : '';
    angleBar.appendChild(seg);
  });
}

function updateUI() {
  const ok = images.length >= 2;
  startBtn.disabled = !ok;
  startBtn.textContent = ok ? `开始体验 (${images.length}张图)` : `请至少上传2张图片 (已有${images.length}张)`;
  renderAngleBar();
}

document.getElementById('fadeSlider').addEventListener('input', function(){
  fadeWidth = +this.value;
  document.getElementById('fadeValue').textContent = fadeWidth + '°';
});

document.getElementById('stripSlider').addEventListener('input', function(){
  stripCount = +this.value;
  document.getElementById('stripValue').textContent = stripCount;
});

function setMode(m) {
  transMode = m;
  document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode===m));
  document.getElementById('stripRow').style.display = m === 'strip' ? '' : 'none';
}

function setOriMode(m) {
  oriMode = m;
  document.querySelectorAll('[data-ori]').forEach(b => b.classList.toggle('active', b.dataset.ori===m));
}

function setAxis(a) {
  tiltAxis = a;
  document.querySelectorAll('.axis-btn').forEach(b => b.classList.toggle('active', b.dataset.axis===a));
}

let scaledImages = [];

function setupCanvas() {
  let mw=0, mh=0;
  images.forEach(m => { mw=Math.max(mw,m.img.naturalWidth); mh=Math.max(mh,m.img.naturalHeight); });
  const s = Math.min(1, 1080/Math.max(mw,mh));
  mainCanvas.width = Math.round(mw*s);
  mainCanvas.height = Math.round(mh*s);
  scaledImages = images.map(m => {
    const c = document.createElement('canvas');
    c.width = mainCanvas.width; c.height = mainCanvas.height;
    c.getContext('2d').drawImage(m.img, 0, 0, c.width, c.height);
    return c;
  });
}

/**
 * 渲染逻辑 v7
 * 两种切换模式:
 * - fade: alpha 透明度渐变 (丝滑)
 * - strip: 条状光栅 (经典)
 */

let sortedImgs = [];
function precompute() {
  sortedImgs = images.map((m, i) => ({
    from: m.fromAngle, to: m.toAngle, idx: i
  })).sort((a, b) => a.from - b.from);
}

// 找到当前角度对应的主图和过渡目标图
function findBlend(angle) {
  const N = sortedImgs.length;
  const halfFade = fadeWidth / 2;
  let showIdx = -1, fadeIdx = -1, fadeAlpha = 0;

  for (let i = 0; i < N; i++) {
    const s = sortedImgs[i];
    if (angle >= s.from && angle < s.to) {
      showIdx = s.idx;

      if (i < N - 1) {
        const dist = s.to - angle;
        if (dist < halfFade) {
          fadeIdx = sortedImgs[i + 1].idx;
          fadeAlpha = (1 - dist / halfFade) * 0.5;
        }
      }
      if (i > 0 && fadeIdx === -1) {
        const dist = angle - s.from;
        if (dist < halfFade) {
          fadeIdx = sortedImgs[i - 1].idx;
          fadeAlpha = (1 - dist / halfFade) * 0.5;
        }
      }
      break;
    }
  }

  if (showIdx === -1) {
    showIdx = angle < sortedImgs[0].from ? sortedImgs[0].idx : sortedImgs[N-1].idx;
  }
  return { showIdx, fadeIdx, fadeAlpha };
}

function drawFrame(angle) {
  const W = mainCanvas.width, H = mainCanvas.height;
  if (!sortedImgs.length || !scaledImages.length) { ctx.clearRect(0,0,W,H); return; }

  const { showIdx, fadeIdx, fadeAlpha } = findBlend(angle);

  // 无过渡: 直接画主图
  if (fadeIdx === -1 || fadeAlpha < 0.005) {
    ctx.globalAlpha = 1;
    ctx.drawImage(scaledImages[showIdx], 0, 0);
    hudShowing.textContent = images[showIdx].name;
    hudShowing.style.color = COLORS[showIdx % 8];
    return;
  }

  if (transMode === 'fade') {
    // ---- 渐变模式: alpha blending ----
    ctx.globalAlpha = 1;
    ctx.drawImage(scaledImages[showIdx], 0, 0);
    ctx.globalAlpha = fadeAlpha;
    ctx.drawImage(scaledImages[fadeIdx], 0, 0);
    ctx.globalAlpha = 1;
  } else {
    // ---- 光栅模式: 条纹切换 ----
    // fadeAlpha 从 0(无过渡) 到 0.5(分割点各半叠加), 直接作为条纹比例
    const t = fadeAlpha;
    ctx.drawImage(scaledImages[showIdx], 0, 0);
    const stripW = W / stripCount;
    ctx.save();
    ctx.beginPath();
    for (let i = 0; i < stripCount; i++) {
      const x = Math.round(i * stripW);
      const nx = Math.round((i + 1) * stripW);
      const fw = nx - x;
      const bW = Math.round(fw * t);
      if (bW > 0) ctx.rect(x + fw - bW, 0, bW, H);
    }
    ctx.clip();
    ctx.drawImage(scaledImages[fadeIdx], 0, 0);
    ctx.restore();

    // 条纹线
    if (stripCount <= 60) {
      ctx.fillStyle = 'rgba(0,0,0,.08)';
      for (let i = 1; i < stripCount; i++) {
        ctx.fillRect(Math.round(i * stripW), 0, 1, H);
      }
    }
  }

  const pct = Math.round((1 - fadeAlpha) * 100);
  hudShowing.textContent = `${images[showIdx].name} ${pct}%`;
  hudShowing.style.color = COLORS[showIdx % 8];
}

let curAngle = 0, smAngle = 0, af = null;

function handleOri(e) {
  if (!isRunning) return;
  const screenAngle = (screen.orientation && screen.orientation.angle) || window.orientation || 0;
  const isLandscape = (Math.abs(screenAngle) === 90 || Math.abs(screenAngle) === 270);

  let raw;
  if (tiltAxis === 'x') {
    if (isLandscape) {
      // 横屏时，物理左右倾斜 = beta 变化，放平=0°
      raw = screenAngle === 90 ? -(e.beta||0) : (e.beta||0);
    } else {
      // 竖屏时，物理左右倾斜 = gamma 变化
      raw = e.gamma || 0;
    }
  } else {
    if (isLandscape) {
      // 横屏时，物理前后倾斜 = gamma 变化
      raw = screenAngle === 90 ? (e.gamma||0) : -(e.gamma||0);
    } else {
      // 竖屏时，物理前后倾斜 = beta 变化，减 45 是因为正常手持约 45°
      raw = (e.beta||0) - 45;
    }
  }
  curAngle = Math.max(-90, Math.min(90, raw));
}

function loop() {
  if (!isRunning) return;
  // 简单的线性插值, 0.3 = 跟手又不抖
  smAngle += (curAngle - smAngle) * 0.3;
  drawFrame(smAngle);
  hudAngle.textContent = Math.round(smAngle) + '°';
  hudDot.style.left = `calc(${((smAngle+90)/180)*100}% - 4px)`;
  af = requestAnimationFrame(loop);
}

async function start() {
  precompute();
  setupCanvas();
  drawFrame(0);
  canvasView.classList.add('active');
  isRunning = true;
  curAngle = 0; smAngle = 0;

  // 全屏
  try {
    const el = document.documentElement;
    if (el.requestFullscreen) await el.requestFullscreen();
    else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
  } catch(e) {}

  // 锁定屏幕方向
  try {
    if (screen.orientation && screen.orientation.lock) {
      if (oriMode === 'portrait') await screen.orientation.lock('portrait');
      else if (oriMode === 'landscape') await screen.orientation.lock('landscape');
      // 'auto' 不锁定
    }
  } catch(e) {}

  // 传感器
  if (typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function') {
    try { const p = await DeviceOrientationEvent.requestPermission(); if(p==='granted') window.addEventListener('deviceorientation',handleOri); } catch(e){}
  } else if (typeof DeviceOrientationEvent!=='undefined') {
    window.addEventListener('deviceorientation', handleOri);
  }
  if (!('ontouchstart' in window)) {
    window.addEventListener('mousemove', e => {
      if (!isRunning) return;
      curAngle = ((e.clientX / window.innerWidth) - 0.5) * 180;
    });
  }
  requestAnimationFrame(loop);
}

function stop() {
  isRunning = false;
  canvasView.classList.remove('active');
  window.removeEventListener('deviceorientation', handleOri);
  if (af) cancelAnimationFrame(af);

  // 退出全屏
  try {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  } catch(e) {}

  // 解锁屏幕方向
  try {
    if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
  } catch(e) {}
}

startBtn.addEventListener('click', start);
document.getElementById('backBtn').addEventListener('click', stop);

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
