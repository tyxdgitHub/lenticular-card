<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>电子光栅卡</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c0c14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080e;--card:#111119;--card2:#181822;
  --accent:#8b7cf7;--accent2:#a694ff;--accent-dim:rgba(139,124,247,.12);
  --mint:#4ecdc4;--coral:#ff6b6b;--amber:#ffc857;
  --text:#ededf4;--text2:#9594a8;--text3:#5d5c6e;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
  --r:16px;--r2:12px
}
body{
  font-family:'Outfit',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100dvh;display:flex;flex-direction:column;align-items:center;
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
  overflow-x:hidden
}

/* ---- Ambient background ---- */
body::before{
  content:'';position:fixed;top:-40%;left:-20%;
  width:140%;height:80%;
  background:radial-gradient(ellipse at 30% 50%,rgba(139,124,247,.06) 0%,transparent 60%),
             radial-gradient(ellipse at 70% 30%,rgba(78,205,196,.04) 0%,transparent 50%);
  pointer-events:none;z-index:0
}

/* ---- Logo / Header ---- */
.hero{
  position:relative;z-index:1;
  width:100%;padding:32px 24px 16px;text-align:center
}
.logo{
  display:inline-flex;align-items:center;gap:10px;margin-bottom:6px
}
.logo-icon{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--mint));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:#fff;
  box-shadow:0 4px 20px rgba(139,124,247,.25)
}
.logo-text{
  font-size:24px;font-weight:700;letter-spacing:1px;
  background:linear-gradient(135deg,#fff 30%,var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent
}
.hero-sub{font-size:13px;color:var(--text3);font-weight:300;letter-spacing:.5px}

/* ---- Panels ---- */
.panel{
  position:relative;z-index:1;
  width:100%;max-width:420px;margin:8px 16px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  animation:panelIn .5s ease both
}
.panel:nth-child(3){animation-delay:.05s}
.panel:nth-child(4){animation-delay:.1s}
.panel:nth-child(5){animation-delay:.15s}

.panel-head{
  padding:14px 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border)
}
.panel-title{font-size:13px;font-weight:500;color:var(--text2);letter-spacing:.5px}
.panel-badge{
  font-size:11px;padding:2px 10px;border-radius:20px;
  background:var(--accent-dim);color:var(--accent2);font-weight:600
}
.panel-body{padding:12px 16px 16px}

/* ---- Image cards ---- */
.img-list{display:flex;flex-direction:column;gap:6px}
.img-card{
  display:flex;align-items:center;gap:12px;
  padding:10px;border-radius:var(--r2);
  background:var(--card2);
  border:1px solid transparent;
  transition:border-color .2s,transform .15s;
  animation:cardIn .3s ease both
}
.img-card:active{transform:scale(.98)}

.img-thumb{
  width:54px;height:54px;border-radius:10px;object-fit:cover;
  flex-shrink:0;background:var(--card);
  box-shadow:0 2px 8px rgba(0,0,0,.3)
}
.img-meta{flex:1;min-width:0}
.img-label{
  font-size:13px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:6px
}
.img-angles{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3)}
.ang-in{
  width:46px;padding:4px;text-align:center;
  border:1px solid var(--border2);border-radius:8px;
  background:var(--bg);color:var(--text);
  font-size:12px;font-family:inherit;outline:none;
  transition:border-color .2s
}
.ang-in:focus{border-color:var(--accent)}
.img-del{
  width:28px;height:28px;border:none;border-radius:8px;
  background:rgba(255,107,107,.1);color:var(--coral);
  font-size:14px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s
}
.img-del:active{background:rgba(255,107,107,.2)}

.add-area{
  margin-top:8px;padding:16px;text-align:center;
  border:1.5px dashed var(--border2);border-radius:var(--r2);
  color:var(--text3);font-size:13px;cursor:pointer;
  transition:all .2s
}
.add-area:active{border-color:var(--accent);color:var(--accent2)}

/* ---- Angle bar ---- */
.abar-wrap{margin-bottom:10px}
.abar{width:100%;height:24px;border-radius:8px;overflow:hidden;display:flex}
.abar-seg{
  height:100%;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:600;color:rgba(255,255,255,.8);
  transition:flex .3s;min-width:2px
}
.abar-ticks{display:flex;justify-content:space-between;margin-top:3px;font-size:9px;color:var(--text3)}
.abar-auto{
  display:inline-flex;margin-top:8px;
  padding:5px 14px;border-radius:20px;
  border:1px solid var(--border2);background:transparent;
  color:var(--accent2);font-size:11px;font-family:inherit;
  cursor:pointer;transition:all .2s
}
.abar-auto:active{background:var(--accent-dim)}

/* ---- Settings rows ---- */
.s-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 0;border-bottom:1px solid var(--border)
}
.s-row:last-child{border-bottom:none}
.s-label{font-size:12px;color:var(--text2);font-weight:400}
.s-right{display:flex;align-items:center;gap:8px}
.s-val{
  font-size:13px;font-weight:600;color:var(--accent2);
  min-width:28px;text-align:right;font-variant-numeric:tabular-nums
}

input[type=range]{
  -webkit-appearance:none;appearance:none;
  width:100px;height:3px;border-radius:2px;
  background:var(--border2);outline:none
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:18px;height:18px;border-radius:50%;
  background:var(--accent);cursor:pointer;
  box-shadow:0 0 8px rgba(139,124,247,.35)
}

/* ---- Toggle pills ---- */
.tog{
  display:flex;background:var(--bg);
  border-radius:10px;overflow:hidden;
  border:1px solid var(--border2);gap:1px
}
.tog-btn{
  padding:5px 12px;font-size:11px;font-family:inherit;
  border:none;background:transparent;color:var(--text3);
  cursor:pointer;transition:all .2s;font-weight:500
}
.tog-btn.on{background:var(--accent);color:#fff}

/* ---- Colors for segments ---- */
.sc0{background:#8b7cf7}.sc1{background:#4ecdc4}.sc2{background:#ff6b6b}.sc3{background:#ffc857}
.sc4{background:#45aaf2}.sc5{background:#fc5c65}.sc6{background:#a3cb38}.sc7{background:#786fa6}

/* ---- Start button ---- */
.go-btn{
  position:relative;z-index:1;
  width:calc(100% - 32px);max-width:420px;
  padding:16px;margin:20px 0 40px;border:none;
  border-radius:var(--r);cursor:pointer;
  font-size:15px;font-weight:600;font-family:inherit;
  letter-spacing:.5px;color:#fff;
  background:linear-gradient(135deg,var(--accent),#6c5ce7);
  box-shadow:0 4px 24px rgba(139,124,247,.3);
  transition:all .2s;
  animation:panelIn .5s ease .2s both
}
.go-btn:disabled{opacity:.2;cursor:not-allowed;box-shadow:none}
.go-btn:not(:disabled):active{transform:scale(.97);box-shadow:0 2px 12px rgba(139,124,247,.4)}

/* ---- Canvas fullscreen view ---- */
.cv{
  display:none;position:fixed;inset:0;background:#000;z-index:200;
  flex-direction:column;align-items:center;justify-content:center
}
.cv.on{display:flex}
.cv canvas{max-width:100%;max-height:82dvh}

.cv-hud{
  position:fixed;bottom:0;left:0;right:0;
  padding:16px 20px max(env(safe-area-inset-bottom,16px),20px);
  display:flex;align-items:flex-end;justify-content:space-between;
  background:linear-gradient(to top,rgba(0,0,0,.95) 50%,transparent)
}
.hud-l{}
.hud-deg{
  font-size:28px;font-weight:700;color:var(--accent2);
  font-variant-numeric:tabular-nums;line-height:1;
  font-family:'Outfit',system-ui,sans-serif
}
.hud-name{font-size:11px;color:rgba(255,255,255,.4);margin-top:5px;font-weight:400}
.hud-track{
  width:180px;height:3px;background:rgba(255,255,255,.08);
  border-radius:2px;margin-top:10px;position:relative
}
.hud-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--accent2);position:absolute;top:-3.5px;
  box-shadow:0 0 10px rgba(166,148,255,.5);
  transition:left .05s linear
}
.hud-back{
  padding:10px 22px;
  border:1px solid rgba(255,255,255,.12);border-radius:var(--r2);
  background:rgba(255,255,255,.05);
  color:#fff;font-size:13px;font-family:inherit;font-weight:500;
  cursor:pointer;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  transition:background .2s
}
.hud-back:active{background:rgba(255,255,255,.12)}

@media(orientation:landscape){
  .cv canvas{max-height:96dvh}
  .cv-hud{padding:8px 20px 12px;align-items:center}
  .hud-deg{font-size:20px}
  .hud-track{width:140px}
  .hud-back{padding:8px 16px;font-size:12px}
}

/* ---- Animations ---- */
@keyframes panelIn{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes cardIn{
  from{opacity:0;transform:translateX(-12px)}
  to{opacity:1;transform:translateX(0)}
}

.hidden{display:none}
</style>
</head>
<body>

<div class="hero">
  <div class="logo">
    <div class="logo-icon">L</div>
    <span class="logo-text">电子光栅卡</span>
  </div>
  <div class="hero-sub">Lenticular Card Simulator</div>
</div>

<!-- Images Panel -->
<div class="panel">
  <div class="panel-head">
    <span class="panel-title">图片列表</span>
    <span class="panel-badge" id="imgCount">0 张</span>
  </div>
  <div class="panel-body">
    <div class="img-list" id="imgList"></div>
    <div class="add-area" id="addBtn">+ 添加图片</div>
    <input type="file" accept="image/*" class="hidden" id="fileInput">
  </div>
</div>

<!-- Angle Panel -->
<div class="panel" id="anglePanel" style="display:none">
  <div class="panel-head">
    <span class="panel-title">角度分布</span>
  </div>
  <div class="panel-body">
    <div class="abar-wrap">
      <div class="abar" id="angleBar"></div>
      <div class="abar-ticks"><span>-90°</span><span>-45°</span><span>0°</span><span>45°</span><span>90°</span></div>
    </div>
    <div style="text-align:center">
      <button class="abar-auto" onclick="autoDistribute()">均分角度</button>
    </div>
  </div>
</div>

<!-- Settings Panel -->
<div class="panel">
  <div class="panel-head">
    <span class="panel-title">参数设置</span>
  </div>
  <div class="panel-body">
    <div class="s-row">
      <span class="s-label">切换模式</span>
      <div class="tog">
        <button class="tog-btn on" data-mode="fade" onclick="setMode('fade')">渐变</button>
        <button class="tog-btn" data-mode="strip" onclick="setMode('strip')">光栅</button>
      </div>
    </div>
    <div class="s-row">
      <span class="s-label">切换范围</span>
      <div class="s-right">
        <input type="range" id="fadeSlider" min="4" max="60" value="30">
        <span class="s-val" id="fadeValue">30°</span>
      </div>
    </div>
    <div class="s-row hidden" id="stripRow">
      <span class="s-label">条纹数</span>
      <div class="s-right">
        <input type="range" id="stripSlider" min="8" max="80" value="24">
        <span class="s-val" id="stripValue">24</span>
      </div>
    </div>
    <div class="s-row">
      <span class="s-label">屏幕方向</span>
      <div class="tog">
        <button class="tog-btn on" data-ori="portrait" onclick="setOriMode('portrait')">竖屏</button>
        <button class="tog-btn" data-ori="landscape" onclick="setOriMode('landscape')">横屏</button>
        <button class="tog-btn" data-ori="auto" onclick="setOriMode('auto')">自动</button>
      </div>
    </div>
    <div class="s-row">
      <span class="s-label">倾斜方向</span>
      <div class="tog">
        <button class="tog-btn on" data-axis="x" onclick="setAxis('x')">左右</button>
        <button class="tog-btn" data-axis="y" onclick="setAxis('y')">前后</button>
      </div>
    </div>
  </div>
</div>

<button class="go-btn" id="startBtn" disabled>请至少上传 2 张图片</button>

<!-- Canvas View -->
<div class="cv" id="canvasView">
  <canvas id="mainCanvas"></canvas>
  <div class="cv-hud">
    <div class="hud-l">
      <div class="hud-deg" id="hudAngle">0°</div>
      <div class="hud-name" id="hudShowing">--</div>
      <div class="hud-track"><div class="hud-dot" id="hudDot" style="left:50%"></div></div>
    </div>
    <button class="hud-back" id="backBtn">← 返回</button>
  </div>
</div>

<script>
const images=[];
let tiltAxis='x',isRunning=false,fadeWidth=30;
let transMode='fade',stripCount=24,oriMode='portrait';
const COLORS=['#8b7cf7','#4ecdc4','#ff6b6b','#ffc857','#45aaf2','#fc5c65','#a3cb38','#786fa6'];

const imgList=document.getElementById('imgList');
const addBtn=document.getElementById('addBtn');
const fileInput=document.getElementById('fileInput');
const anglePanel=document.getElementById('anglePanel');
const angleBar=document.getElementById('angleBar');
const startBtn=document.getElementById('startBtn');
const canvasView=document.getElementById('canvasView');
const mainCanvas=document.getElementById('mainCanvas');
const ctx=mainCanvas.getContext('2d');
const hudAngle=document.getElementById('hudAngle');
const hudShowing=document.getElementById('hudShowing');
const hudDot=document.getElementById('hudDot');

addBtn.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>{
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      images.push({img,src:ev.target.result,
        name:file.name.length>16?file.name.slice(0,14)+'…':file.name,
        fromAngle:0,toAngle:0});
      autoDistribute();renderList();updateUI();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
  fileInput.value='';
});

function removeImage(i){images.splice(i,1);autoDistribute();renderList();updateUI()}

function renderList(){
  imgList.innerHTML='';
  images.forEach((m,i)=>{
    const d=document.createElement('div');
    d.className='img-card';
    d.style.animationDelay=i*30+'ms';
    d.innerHTML=
      `<img class="img-thumb" src="${m.src}">`+
      `<div class="img-meta">`+
        `<div class="img-label" style="color:${COLORS[i%8]}">${i+1}. ${m.name}</div>`+
        `<div class="img-angles">`+
          `<input class="ang-in" type="number" value="${m.fromAngle}" min="-90" max="90" onchange="updA(${i},'f',this.value)">`+
          `<span>° →</span>`+
          `<input class="ang-in" type="number" value="${m.toAngle}" min="-90" max="90" onchange="updA(${i},'t',this.value)">`+
          `<span>°</span>`+
        `</div>`+
      `</div>`+
      `<button class="img-del" onclick="removeImage(${i})">✕</button>`;
    imgList.appendChild(d);
  });
}

function updA(i,w,v){
  v=Math.max(-90,Math.min(90,parseInt(v)||0));
  if(w==='f')images[i].fromAngle=v;else images[i].toAngle=v;
  renderAngleBar();
}

function autoDistribute(){
  if(!images.length)return;
  const s=180/images.length;
  images.forEach((m,i)=>{m.fromAngle=Math.round(-90+i*s);m.toAngle=Math.round(-90+(i+1)*s)});
  renderList();renderAngleBar();
}

function renderAngleBar(){
  angleBar.innerHTML='';
  if(!images.length){anglePanel.style.display='none';return}
  anglePanel.style.display='';
  const sorted=images.map((m,i)=>({...m,idx:i})).sort((a,b)=>a.fromAngle-b.fromAngle);
  sorted.forEach(m=>{
    const span=Math.max(1,Math.abs(m.toAngle-m.fromAngle));
    const seg=document.createElement('div');
    seg.className=`abar-seg sc${m.idx%8}`;
    seg.style.flex=span;
    seg.textContent=span>=20?`${m.fromAngle}°~${m.toAngle}°`:'';
    angleBar.appendChild(seg);
  });
}

function updateUI(){
  document.getElementById('imgCount').textContent=images.length+' 张';
  const ok=images.length>=2;
  startBtn.disabled=!ok;
  startBtn.textContent=ok?`开始体验`:`请至少上传 2 张图片`;
  renderAngleBar();
}

document.getElementById('fadeSlider').addEventListener('input',function(){
  fadeWidth=+this.value;document.getElementById('fadeValue').textContent=fadeWidth+'°';
});
document.getElementById('stripSlider').addEventListener('input',function(){
  stripCount=+this.value;document.getElementById('stripValue').textContent=stripCount;
});

function setMode(m){
  transMode=m;
  document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('on',b.dataset.mode===m));
  document.getElementById('stripRow').classList.toggle('hidden',m!=='strip');
}
function setOriMode(m){
  oriMode=m;
  document.querySelectorAll('[data-ori]').forEach(b=>b.classList.toggle('on',b.dataset.ori===m));
}
function setAxis(a){
  tiltAxis=a;
  document.querySelectorAll('[data-axis]').forEach(b=>b.classList.toggle('on',b.dataset.axis===a));
}

let scaledImages=[];
function setupCanvas(){
  let mw=0,mh=0;
  images.forEach(m=>{mw=Math.max(mw,m.img.naturalWidth);mh=Math.max(mh,m.img.naturalHeight)});
  const s=Math.min(1,1080/Math.max(mw,mh));
  mainCanvas.width=Math.round(mw*s);mainCanvas.height=Math.round(mh*s);
  scaledImages=images.map(m=>{
    const c=document.createElement('canvas');
    c.width=mainCanvas.width;c.height=mainCanvas.height;
    c.getContext('2d').drawImage(m.img,0,0,c.width,c.height);
    return c;
  });
}

let sortedImgs=[];
function precompute(){
  sortedImgs=images.map((m,i)=>({from:m.fromAngle,to:m.toAngle,idx:i})).sort((a,b)=>a.from-b.from);
}

function findBlend(angle){
  const N=sortedImgs.length,hf=fadeWidth/2;
  let si=-1,fi=-1,fa=0;
  for(let i=0;i<N;i++){
    const s=sortedImgs[i];
    if(angle>=s.from&&angle<s.to){
      si=s.idx;
      if(i<N-1){const d=s.to-angle;if(d<hf){fi=sortedImgs[i+1].idx;fa=(1-d/hf)*.5}}
      if(i>0&&fi===-1){const d=angle-s.from;if(d<hf){fi=sortedImgs[i-1].idx;fa=(1-d/hf)*.5}}
      break;
    }
  }
  if(si===-1)si=angle<sortedImgs[0].from?sortedImgs[0].idx:sortedImgs[N-1].idx;
  return{si,fi,fa};
}

function drawFrame(angle){
  const W=mainCanvas.width,H=mainCanvas.height;
  if(!sortedImgs.length||!scaledImages.length){ctx.clearRect(0,0,W,H);return}
  const{si,fi,fa}=findBlend(angle);

  if(fi===-1||fa<.005){
    ctx.globalAlpha=1;ctx.drawImage(scaledImages[si],0,0);
    hudShowing.textContent=images[si].name;hudShowing.style.color=COLORS[si%8];
    return;
  }

  if(transMode==='fade'){
    ctx.globalAlpha=1;ctx.drawImage(scaledImages[si],0,0);
    ctx.globalAlpha=fa;ctx.drawImage(scaledImages[fi],0,0);
    ctx.globalAlpha=1;
  }else{
    const t=fa;
    ctx.drawImage(scaledImages[si],0,0);
    const sw=W/stripCount;
    ctx.save();ctx.beginPath();
    for(let i=0;i<stripCount;i++){
      const x=Math.round(i*sw),nx=Math.round((i+1)*sw),fw=nx-x;
      const bW=Math.round(fw*t);
      if(bW>0)ctx.rect(x+fw-bW,0,bW,H);
    }
    ctx.clip();ctx.drawImage(scaledImages[fi],0,0);ctx.restore();
    if(stripCount<=60){
      ctx.fillStyle='rgba(0,0,0,.08)';
      for(let i=1;i<stripCount;i++)ctx.fillRect(Math.round(i*sw),0,1,H);
    }
  }
  const pct=Math.round((1-fa)*100);
  hudShowing.textContent=`${images[si].name} ${pct}%`;
  hudShowing.style.color=COLORS[si%8];
}

let curAngle=0,smAngle=0,af=null;

function handleOri(e){
  if(!isRunning)return;
  const sa=(screen.orientation&&screen.orientation.angle)||window.orientation||0;
  const isL=Math.abs(sa)===90||Math.abs(sa)===270;
  let raw;
  if(tiltAxis==='x'){
    raw=isL?(sa===90?-(e.beta||0):(e.beta||0)):(e.gamma||0);
  }else{
    raw=isL?(sa===90?(e.gamma||0):-(e.gamma||0)):((e.beta||0)-45);
  }
  curAngle=Math.max(-90,Math.min(90,raw));
}

function loop(){
  if(!isRunning)return;
  smAngle+=(curAngle-smAngle)*.3;
  drawFrame(smAngle);
  hudAngle.textContent=Math.round(smAngle)+'°';
  hudDot.style.left=`calc(${((smAngle+90)/180)*100}% - 5px)`;
  af=requestAnimationFrame(loop);
}

async function start(){
  precompute();setupCanvas();drawFrame(0);
  canvasView.classList.add('on');isRunning=true;curAngle=0;smAngle=0;
  try{const el=document.documentElement;if(el.requestFullscreen)await el.requestFullscreen();else if(el.webkitRequestFullscreen)await el.webkitRequestFullscreen()}catch(e){}
  try{if(screen.orientation&&screen.orientation.lock){if(oriMode==='portrait')await screen.orientation.lock('portrait');else if(oriMode==='landscape')await screen.orientation.lock('landscape')}}catch(e){}
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    try{const p=await DeviceOrientationEvent.requestPermission();if(p==='granted')window.addEventListener('deviceorientation',handleOri)}catch(e){}
  }else if(typeof DeviceOrientationEvent!=='undefined'){window.addEventListener('deviceorientation',handleOri)}
  if(!('ontouchstart'in window)){window.addEventListener('mousemove',e=>{if(isRunning)curAngle=((e.clientX/window.innerWidth)-.5)*180})}
  requestAnimationFrame(loop);
}

function stop(){
  isRunning=false;canvasView.classList.remove('on');
  window.removeEventListener('deviceorientation',handleOri);
  if(af)cancelAnimationFrame(af);
  try{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen()}catch(e){}
  try{if(screen.orientation&&screen.orientation.unlock)screen.orientation.unlock()}catch(e){}
}

startBtn.addEventListener('click',start);
document.getElementById('backBtn').addEventListener('click',stop);
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
